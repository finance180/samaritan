<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>SAMARITAN</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --red:#c41e1e;--red-bright:#ff2a2a;--red-dim:#661010;
  --red-glow:rgba(196,30,30,0.3);--bg:#0a0a0a;--bg-card:#111;
  --bg-card-hover:#1a1a1a;--text:#ccc;--text-dim:#666;
  --text-bright:#fff;--border:#222;--high:#ff2a2a;
  --medium:#cc8800;--low:#448844;--completed:#333;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;overscroll-behavior-y:contain}

/* === HEADER === */
.header{background:linear-gradient(180deg,#111 0%,var(--bg) 100%);border-bottom:1px solid var(--red-dim);padding:calc(12px + var(--safe-top)) 20px 12px;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.logo{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--red-bright);letter-spacing:6px;text-shadow:0 0 20px var(--red-glow)}
.logo-tri{display:inline-block;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:12px solid var(--red-bright);margin-right:8px;vertical-align:middle;filter:drop-shadow(0 0 6px var(--red-glow))}
.status{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--red);letter-spacing:2px;display:flex;align-items:center;gap:6px}
.status .dot{width:6px;height:6px;background:var(--red-bright);border-radius:50%;animation:pulse 2s infinite}
.status.offline .dot{background:var(--text-dim);animation:none}
.status.offline{color:var(--text-dim)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.date-bar{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:1px}
.greeting{font-size:13px;font-style:italic;color:var(--text-dim);margin-top:6px;line-height:1.4}
.greeting-author{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--red-dim);letter-spacing:1px;margin-top:2px}
.last-sync{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px;margin-top:2px}

/* === STATS === */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:8px 6px;text-align:center}
.stat-value{font-family:'Share Tech Mono',monospace;font-size:22px;color:var(--red-bright);font-weight:700}
.stat-value.warning{color:var(--high)}
.stat-value.good{color:var(--low)}
.stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:1px}

/* === BIZ FILTER === */
.biz-filter{display:flex;gap:0;padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border)}
.biz-filter::-webkit-scrollbar{display:none}
.biz-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:8px 14px;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;min-height:36px;display:flex;align-items:center}
.biz-btn.active{color:var(--red-bright);border-bottom-color:var(--red-bright)}

/* === CONTENT === */
.content{padding:8px 20px calc(90px + var(--safe-bottom))}
.section-header{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--red-dim)}
.section-header.overdue-header{color:var(--high);border-bottom-color:var(--high)}

/* === EVENT CARDS === */
.event-card{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:2px;margin-bottom:4px;cursor:pointer;overflow:hidden;transition:all .3s}
.event-card.now{border-left-color:var(--red-bright);background:linear-gradient(90deg,rgba(196,30,30,0.08) 0%,var(--bg-card) 100%)}
.event-card.now .event-time{color:var(--red-bright);font-weight:700}
.event-card.deleting{opacity:0;max-height:0;margin:0;padding:0;border:0}
.event-inner{padding:10px 14px;display:flex;align-items:center;gap:12px;min-height:44px}
.event-time{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);min-width:60px}
.event-title{font-size:14px;color:var(--text);flex:1}
.event-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--red-bright);letter-spacing:1px;background:var(--red-dim);padding:1px 5px;border-radius:2px}
.event-actions{display:none;padding:0 14px 10px;gap:8px}
.event-actions.show{display:flex}

/* === EVENT EDIT MODAL === */
.edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;padding:20px;padding-top:calc(80px + var(--safe-top));flex-direction:column;gap:12px}
.edit-modal.show{display:flex}
.edit-modal label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:-8px}
.edit-modal input{width:100%;background:var(--bg-card);border:1px solid var(--red-dim);border-radius:4px;padding:12px;color:var(--text-bright);font-size:15px;font-family:'Rajdhani',sans-serif;outline:none;min-height:44px}
.edit-modal input::placeholder{color:var(--text-dim)}
.edit-modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.edit-modal-btns button{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:10px 18px;border-radius:2px;cursor:pointer;min-height:44px;border:1px solid var(--border)}
.edit-modal-btns .cancel{background:var(--bg);color:var(--text-dim)}
.edit-modal-btns .save{background:var(--red);color:#fff;border-color:var(--red)}
.edit-modal-btns .delete{background:var(--bg);color:var(--high);border-color:var(--high)}

/* === TASK CARDS === */
.task-card{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--medium);border-radius:2px;margin-bottom:6px;position:relative;overflow:hidden;transition:all .3s}
.task-card.priority-High{border-left-color:var(--high)}
.task-card.priority-Medium{border-left-color:var(--medium)}
.task-card.priority-Low{border-left-color:var(--low)}
.task-card.completing{opacity:0;transform:translateX(100px);max-height:0;margin:0;padding:0;border:0}
.task-card.postponing{opacity:0;transform:translateX(-100px);max-height:0;margin:0;padding:0;border:0}
.task-inner{padding:12px 14px;min-height:44px}
.task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.task-title{font-size:15px;font-weight:600;color:var(--text-bright);line-height:1.3}
.task-priority{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:2px;white-space:nowrap;flex-shrink:0}
.task-priority.High{background:var(--red-dim);color:var(--high)}
.task-priority.Medium{background:#332200;color:var(--medium)}
.task-priority.Low{background:#1a331a;color:var(--low)}
.task-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:5px;font-size:10px;color:var(--text-dim);font-family:'Share Tech Mono',monospace}
.task-meta span{display:flex;align-items:center;gap:3px}
.overdue{color:var(--high)!important}

/* === TASK ACTIONS === */
.task-actions{display:none;padding:0 14px 10px;gap:8px}
.task-actions.show{display:flex}
.task-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 12px;border:1px solid var(--border);border-radius:2px;background:var(--bg);color:var(--text-dim);cursor:pointer;min-height:32px;transition:all .15s}
.task-btn:active{transform:scale(.95)}
.task-btn.complete{border-color:var(--low);color:var(--low)}
.task-btn.postpone{border-color:var(--medium);color:var(--medium)}

/* === SEARCH === */
.search-bar{padding:10px 20px 6px}
.search-input{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:10px 14px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;min-height:44px}
.search-input:focus{border-color:var(--red-dim)}
.search-input::placeholder{color:var(--text-dim)}

/* === JOURNAL === */
.journal-card{background:linear-gradient(135deg,#1a0a0a 0%,var(--bg-card) 100%);border:1px solid var(--red-dim);border-radius:4px;padding:20px;margin:8px 0 16px}
.journal-quote{font-size:16px;color:var(--text-bright);font-style:italic;line-height:1.6;margin-bottom:10px}
.journal-author{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);letter-spacing:1px}
.journal-prompt{color:var(--text-dim);font-size:14px;padding:8px 0;line-height:1.6}

/* === QUICK ADD === */
.fab{position:fixed;bottom:calc(70px + var(--safe-bottom));right:20px;width:50px;height:50px;background:var(--red);border:none;border-radius:50%;color:#fff;font-size:28px;cursor:pointer;z-index:99;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px var(--red-glow);transition:transform .2s}
.fab:active{transform:scale(.9)}
.add-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;padding:20px;padding-top:calc(60px + var(--safe-top));flex-direction:column}
.add-modal.show{display:flex}
.add-modal input{width:100%;background:var(--bg-card);border:1px solid var(--red-dim);border-radius:4px;padding:14px;color:var(--text-bright);font-size:16px;font-family:'Rajdhani',sans-serif;outline:none;margin-bottom:10px;min-height:50px}
.add-modal input::placeholder{color:var(--text-dim)}
.add-modal-btns{display:flex;gap:8px;justify-content:flex-end}
.add-modal-btns button{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1px;padding:10px 20px;border-radius:2px;cursor:pointer;min-height:44px;border:1px solid var(--border)}
.add-modal-btns .cancel{background:var(--bg);color:var(--text-dim)}
.add-modal-btns .submit{background:var(--red);color:#fff;border-color:var(--red)}

/* === EMPTY & LOADING === */
.loading{text-align:center;padding:40px;font-family:'Share Tech Mono',monospace;color:var(--text-dim);font-size:12px;letter-spacing:2px}
.empty{text-align:center;padding:30px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1px;line-height:1.8}

/* === BOTTOM NAV === */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid var(--red-dim);display:grid;grid-template-columns:repeat(5,1fr);padding:6px 0 var(--safe-bottom);z-index:100}

/* === EMAIL SUGGESTIONS === */
.email-card{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--medium);border-radius:2px;margin-bottom:6px;overflow:hidden;transition:all .3s}
.email-card.approved{border-left-color:var(--low);opacity:0;transform:translateX(100px);max-height:0;margin:0;padding:0;border:0}
.email-card.dismissed{border-left-color:var(--completed);opacity:0;transform:translateX(-100px);max-height:0;margin:0;padding:0;border:0}
.email-inner{padding:12px 14px}
.email-from{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--red);letter-spacing:1px;margin-bottom:4px}
.email-subject{font-size:14px;color:var(--text-bright);font-weight:600;line-height:1.3;margin-bottom:4px}
.email-suggestion{font-size:12px;color:var(--medium);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.email-suggestion span{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--text-dim)}
.email-btns{display:flex;gap:8px;padding:0 14px 10px}
.email-btn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 14px;border:1px solid var(--border);border-radius:2px;background:var(--bg);cursor:pointer;min-height:32px;transition:all .15s}
.email-btn:active{transform:scale(.95)}
.email-btn.approve{border-color:var(--low);color:var(--low)}
.email-btn.dismiss{border-color:var(--text-dim);color:var(--text-dim)}
.email-count{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:1px;padding:8px 0}

/* === NOTES === */
.note-card{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--red-dim);border-radius:2px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.note-card:active{background:var(--bg-card-hover)}
.note-card.type-link{border-left-color:var(--medium)}
.note-card.type-idea{border-left-color:var(--low)}
.note-card.type-reference{border-left-color:#6666cc}
.note-card.pinned{border-left-color:var(--red-bright)}
.note-title{font-size:14px;font-weight:600;color:var(--text-bright);line-height:1.3;margin-bottom:4px}
.note-preview{font-size:12px;color:var(--text-dim);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.note-meta{display:flex;gap:8px;margin-top:6px;font-size:10px;color:var(--text-dim);font-family:'Share Tech Mono',monospace}
.note-tag{background:var(--border);color:var(--text-dim);padding:1px 6px;border-radius:2px;font-size:9px}
.note-link{color:var(--medium);text-decoration:none;font-size:12px;word-break:break-all}
.note-type-btn.active,.note-biz-btn.active{border-color:var(--red)!important;color:var(--red)!important}

/* === DROP ZONE === */
.drop-zone{margin:0 20px 8px;border:2px dashed var(--border);border-radius:4px;padding:16px;text-align:center;transition:all .2s;cursor:pointer;min-height:44px}
.drop-zone.drag-over{border-color:var(--red-bright);background:rgba(196,30,30,0.08)}
.drop-zone-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px}
.drop-zone.drag-over .drop-zone-text{color:var(--red-bright)}
.drop-zone.uploading .drop-zone-text{color:var(--medium)}
.file-preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.file-chip{background:var(--bg-card);border:1px solid var(--border);border-radius:2px;padding:4px 8px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);display:flex;align-items:center;gap:4px}
.file-chip.done{border-color:var(--low);color:var(--low)}
.file-chip.error{border-color:var(--high);color:var(--high)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px;color:var(--text-dim);cursor:pointer;font-size:9px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;text-transform:uppercase;min-height:44px;justify-content:center;transition:color .2s}
.nav-item.active{color:var(--red-bright)}
.nav-icon{font-size:18px}

/* === VIEWS === */
.view{display:none;animation:fadeIn .2s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* === WEEK VIEW === */
.week-day{margin-bottom:16px}
.week-day-header{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-bright);letter-spacing:1px;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:6px}
.week-day-header.today-header{color:var(--red-bright);border-bottom-color:var(--red-dim)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo"><span class="logo-tri"></span>SAMARITAN</div>
    <div class="status" id="status"><span class="dot"></span>ONLINE</div>
  </div>
  <div class="date-bar" id="dateBar"></div>
  <div class="greeting" id="greeting"></div>
  <div class="greeting-author" id="greetingAuthor"></div>
  <div class="last-sync" id="lastSync"></div>
</div>

<div class="stats-row">
  <div class="stat-card" onclick="navTo('Tasks')"><div class="stat-value" id="statToday">-</div><div class="stat-label">Today</div></div>
  <div class="stat-card" onclick="navTo('Tasks')"><div class="stat-value" id="statOverdue">-</div><div class="stat-label">Overdue</div></div>
  <div class="stat-card" onclick="navTo('Tasks')"><div class="stat-value" id="statDone">-</div><div class="stat-label">Done</div></div>
  <div class="stat-card" onclick="navTo('All')"><div class="stat-value" id="statActive">-</div><div class="stat-label">Active</div></div>
</div>

<!-- TODAY VIEW -->
<div class="view active" id="viewTasks">
  <div class="biz-filter">
    <div class="biz-btn active" onclick="filterBiz('All',this)">ALL</div>
    <div class="biz-btn" onclick="filterBiz('Happy Pup Manor',this)">HPM</div>
    <div class="biz-btn" onclick="filterBiz('Reseller Business',this)">RESELLER</div>
    <div class="biz-btn" onclick="filterBiz('Personal',this)">PERSONAL</div>
  </div>
  <div class="content" id="taskContent"><div class="loading">LOADING</div></div>
</div>

<!-- CALENDAR VIEW -->
<div class="view" id="viewCalendar">
  <div class="content" id="calendarContent"><div class="loading">LOADING</div></div>
</div>

<!-- JOURNAL VIEW -->
<div class="view" id="viewJournal">
  <div class="content" id="journalContent"></div>
</div>

<!-- EMAIL VIEW -->
<div class="view" id="viewEmail">
  <div style="display:flex;justify-content:flex-end;padding:10px 20px 0">
    <button class="task-btn" id="scanBtn" style="border-color:var(--red);color:var(--red)" onclick="refreshEmailView()">REFRESH</button>
  </div>
  <div class="content" id="emailContent"><div class="loading">LOADING EMAILS</div></div>
</div>

<!-- NOTES VIEW -->
<div class="view" id="viewNotes">
  <div class="search-bar" style="display:flex;gap:8px;padding:10px 20px 6px">
    <input class="search-input" id="noteSearchInput" placeholder="SEARCH NOTES..." oninput="filterNotes()" style="flex:1">
    <button class="task-btn" style="border-color:var(--red);color:var(--red);white-space:nowrap;padding:0 14px" onclick="showNoteModal()">+ NOTE</button>
  </div>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" multiple style="display:none" onchange="handleFiles(this.files)">
    <div class="drop-zone-text" onclick="document.getElementById('fileInput').click()">DROP FILES HERE OR TAP TO UPLOAD</div>
  </div>
  <div class="content" id="notesContent"><div class="loading">LOADING</div></div>
</div>

<!-- ALL VIEW -->
<div class="view" id="viewAll">
  <div class="search-bar"><input class="search-input" id="searchInput" placeholder="SEARCH TASKS..." oninput="filterAllTasks()"></div>
  <div class="content" id="allContent"><div class="loading">LOADING</div></div>
</div>

<!-- QUICK ADD -->
<button class="fab" onclick="showAddModal()">+</button>
<div class="add-modal" id="addModal">
  <input id="addInput" placeholder="Task or event... e.g. 'Lunch with Mom tomorrow'" onkeydown="if(event.key==='Enter')smartAdd()">
  <div class="add-modal-btns">
    <button class="cancel" onclick="hideAddModal()">CANCEL</button>
    <button class="submit" onclick="smartAdd()">ADD</button>
  </div>
</div>

<!-- NOTE ADD/EDIT MODAL -->
<div class="edit-modal" id="noteModal">
  <label>TITLE</label>
  <input id="noteTitle" placeholder="Note title (optional)">
  <label>CONTENT</label>
  <textarea id="noteContent" placeholder="Paste anything — links, text, ideas..." style="width:100%;background:var(--bg-card);border:1px solid var(--red-dim);border-radius:4px;padding:12px;color:var(--text-bright);font-size:14px;font-family:'Rajdhani',sans-serif;outline:none;min-height:120px;resize:vertical"></textarea>
  <label>TYPE</label>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="task-btn note-type-btn active" onclick="setNoteType('text',this)">TEXT</button>
    <button class="task-btn note-type-btn" onclick="setNoteType('link',this)">LINK</button>
    <button class="task-btn note-type-btn" onclick="setNoteType('idea',this)">IDEA</button>
    <button class="task-btn note-type-btn" onclick="setNoteType('reference',this)">REF</button>
  </div>
  <label>BUSINESS</label>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="task-btn note-biz-btn active" onclick="setNoteBiz('Personal',this)">PERSONAL</button>
    <button class="task-btn note-biz-btn" onclick="setNoteBiz('Happy Pup Manor',this)">HPM</button>
    <button class="task-btn note-biz-btn" onclick="setNoteBiz('Reseller Business',this)">RESELLER</button>
  </div>
  <div class="edit-modal-btns">
    <button class="delete" id="noteDeleteBtn" style="display:none" onclick="deleteNote()">DELETE</button>
    <button class="cancel" onclick="hideNoteModal()">CANCEL</button>
    <button class="save" onclick="saveNote()">SAVE</button>
  </div>
</div>

<!-- EVENT EDIT MODAL -->
<div class="edit-modal" id="editModal">
  <label>EVENT NAME</label>
  <input id="editSummary" placeholder="Event name">
  <label>DATE</label>
  <input id="editDate" type="date">
  <label>START TIME</label>
  <input id="editStart" type="time">
  <label>END TIME</label>
  <input id="editEnd" type="time">
  <div class="edit-modal-btns">
    <button class="delete" onclick="deleteEvent()">DELETE</button>
    <button class="cancel" onclick="hideEditModal()">CANCEL</button>
    <button class="save" onclick="saveEvent()">SAVE</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchView('Tasks',this)"><span class="nav-icon">&#9673;</span>TODAY</div>
  <div class="nav-item" onclick="switchView('Calendar',this)"><span class="nav-icon">&#9638;</span>WEEK</div>

const EVENT_WORDS=/\b(lunch|dinner|breakfast|brunch|meeting|call|appointment|coffee|drinks|party|wedding|ceremony|game|match|concert|show|visit|pickup|drop.?off|class|session|lesson|interview|demo|presentation|hangout|date)\b/i;
const TIME_WORDS=/\b(at \d|noon|morning|afternoon|evening|\d{1,2}:\d{2}|\d{1,2}\s?(am|pm))\b/i;

async function smartAdd(){
  const input=document.getElementById('addInput');
  const title=input.value.trim();
  if(!title)return;
  if(EVENT_WORDS.test(title)||TIME_WORDS.test(title)){
    await quickAddEvent(title);
  } else {
    await insert('tasks',{title:title,business:'Personal',priority:'Medium',due_date:todayStr()});
  }
  hideAddModal();
  loadDashboard();
}

async function quickAddEvent(title){
  const t=todayStr();
  // Parse "tomorrow" or "today"
  let eventDate=t;
  if(/\btomorrow\b/i.test(title)){
    const d=new Date();d.setDate(d.getDate()+1);
    eventDate=d.toLocaleDateString('en-CA',{timeZone:'America/Chicago'});
  }
  // Try to extract time
  let startTime='12:00';
  const timeMatch=title.match(/\bat\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
  if(timeMatch){
    let hr=parseInt(timeMatch[1]);
    const min=timeMatch[2]||'00';
    const ampm=timeMatch[3];
    if(ampm&&ampm.toLowerCase()==='pm'&&hr<12)hr+=12;
    if(ampm&&ampm.toLowerCase()==='am'&&hr===12)hr=0;
    startTime=String(hr).padStart(2,'0')+':'+min;
  } else if(/\bnoon\b/i.test(title)){startTime='12:00'}
  else if(/\bmorning\b/i.test(title)){startTime='09:00'}
  else if(/\bafternoon\b/i.test(title)){startTime='14:00'}
  else if(/\bevening\b/i.test(title)){startTime='18:00'}
  // Clean title
  const cleanTitle=title.replace(/\b(tomorrow|today|at\s+\d{1,2}(:\d{2})?\s*(am|pm)?|noon|morning|afternoon|evening)\b/gi,'').replace(/\s+/g,' ').trim();
  // Calculate end time (+1 hour)
  const [sh,sm]=startTime.split(':').map(Number);
  const endTime=String(sh+1).padStart(2,'0')+':'+String(sm).padStart(2,'0');
  await insert('calendar_cache',{event_date:eventDate,start_time:startTime,end_time:endTime,summary:cleanTitle||title,all_day:false,location:''});
  hideAddModal();
  loadDashboard();
}

async function loadDashboard(){

  const [today_t,overdue_t,all_t,done_t,events]=await Promise.all([
    q('tasks','due_date=eq.'+t+'&status=eq.Active&order=priority'),
    q('tasks','due_date=lt.'+t+'&status=eq.Active&order=due_date'),
    q('tasks','status=eq.Active'),
    q('tasks','status=eq.Completed&completed_at=gte.'+t+'T00:00:00'),
    q('calendar_cache','event_date=eq.'+t+'&order=start_time')
  ]);

  todayTasks=today_t;overdueTasks=overdue_t;cachedEvents=events;

  // Stats
  document.getElementById('statToday').textContent=today_t.length;
  const ov=document.getElementById('statOverdue');
  ov.textContent=overdue_t.length;
  ov.className='stat-value'+(overdue_t.length>0?' warning':'');
  const dn=document.getElementById('statDone');
  dn.textContent=done_t.length;
  dn.className='stat-value'+(done_t.length>0?' good':'');
  document.getElementById('statActive').textContent=all_t.length;

  renderTodayView();
  renderJournal(now);
}

function renderTodayView(){
  const container=document.getElementById('taskContent');
  const t=todayStr();
  const nowTime=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/Chicago'});
  let html='';

  // Calendar events from cache
  const events=cachedEvents;
  if(events.length>0){
    html+='<div class="section-header">CALENDAR</div>';
    events.forEach(ev=>{
      const isNow=ev.start_time&&ev.end_time&&nowTime>=ev.start_time&&nowTime<=ev.end_time;
      const isNext=!isNow&&ev.start_time&&ev.start_time>nowTime;
      let timeStr=ev.all_day?'All day':ev.start_time;
      if(timeStr&&!ev.all_day){
        // Format HH:MM to h:MM AM/PM
        const [h,m]=timeStr.split(':');
        const hr=parseInt(h);
        timeStr=(hr>12?hr-12:hr||12)+':'+m+(hr>=12?' PM':' AM');
      }
      html+=`<div class="event-card${isNow?' now':''}" onclick="openEditModal(${ev.id},'${ev.event_date}','${ev.start_time||''}','${ev.end_time||''}','${ev.summary.replace(/'/g,"\\'")}')">
        <div class="event-inner">
          <div class="event-time">${timeStr}</div>
          <div class="event-title">${ev.summary}</div>
          ${isNow?'<div class="event-label">NOW</div>':''}
        </div>
      </div>`;
    });
  }

  // Overdue
  const filteredOverdue=currentBizFilter==='All'?overdueTasks:overdueTasks.filter(x=>x.business===currentBizFilter);
  if(filteredOverdue.length>0){
    html+='<div class="section-header overdue-header">OVERDUE</div>';
    filteredOverdue.forEach(t=>{
      html+=taskCard(t,true);
    });
  }

  // Today's tasks
  const filteredToday=currentBizFilter==='All'?todayTasks:todayTasks.filter(x=>x.business===currentBizFilter);
  if(filteredToday.length>0){
    const grouped={};
    filteredToday.forEach(t=>{const b=t.business||'Personal';if(!grouped[b])grouped[b]=[];grouped[b].push(t)});
    for(const[biz,items]of Object.entries(grouped)){
      html+=`<div class="section-header">${biz}</div>`;
      items.forEach(t=>{html+=taskCard(t)});
    }
  }

  if(!html){
    const hr=parseInt(new Date().toLocaleTimeString('en-US',{hour:'numeric',hour12:false,timeZone:'America/Chicago'}));
    const msg=hr<12?'No tasks due today. Fresh start.':hr<17?'All clear for the rest of the day.':'Nothing left today. Rest up.';
    html=`<div class="empty">${msg}</div>`;
  }

  container.innerHTML=html;
}

function taskCard(t,isOverdue=false){
  const dueDateStr=t.due_date?fmtDate(t.due_date):'';
  return `<div class="task-card priority-${t.priority}" onclick="toggleActions('${t.task_id}')">
    <div class="task-inner">
      <div class="task-top">
        <div class="task-title">${t.title}</div>
        <div class="task-priority ${t.priority}">${isOverdue?'OVERDUE':t.priority.toUpperCase()}</div>
      </div>
      <div class="task-meta">
        ${t.task_id?'<span>'+t.task_id+'</span>':''}
        ${t.project?'<span>'+t.project+'</span>':''}
        ${dueDateStr?'<span class="'+(isOverdue?'overdue':'')+'">'+(isOverdue?'Was due ':'')+dueDateStr+'</span>':''}
        ${t.assigned_to!=='Brian'?'<span>\u2192 '+t.assigned_to+'</span>':''}
        ${t.recurrence!=='None'?'<span>\u21BB '+t.recurrence+'</span>':''}
      </div>
    </div>
    <div class="task-actions" id="actions-${t.task_id}">
      <button class="task-btn complete" onclick="event.stopPropagation();completeTask('${t.task_id}',this)">COMPLETE</button>
      <button class="task-btn postpone" onclick="event.stopPropagation();postponeTask('${t.task_id}',this)">TOMORROW</button>
    </div>
  </div>`;
}

// === WEEK VIEW ===
async function loadWeekView(){
  const container=document.getElementById('calendarContent');
  const now=new Date();
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(now);d.setDate(d.getDate()+i);
    days.push(d.toLocaleDateString('en-CA',{timeZone:'America/Chicago'}));
  }

  const [tasks,events]=await Promise.all([
    q('tasks','due_date=gte.'+days[0]+'&due_date=lte.'+days[6]+'&status=eq.Active&order=due_date,priority'),
    q('calendar_cache','event_date=gte.'+days[0]+'&event_date=lte.'+days[6]+'&order=event_date,start_time')
  ]);

  let html='';
  const t=todayStr();

  days.forEach(d=>{
    const dt=new Date(d+'T12:00:00');
    const label=dt.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric',timeZone:'America/Chicago'});
    const isToday=d===t;
    const dayEvents=events.filter(e=>e.event_date===d);
    const dayTasks=tasks.filter(tk=>tk.due_date===d);

    if(dayEvents.length===0&&dayTasks.length===0)return;

    html+=`<div class="week-day"><div class="week-day-header${isToday?' today-header':''}">${isToday?'TODAY \u2014 ':''} ${label.toUpperCase()}</div>`;

    dayEvents.forEach(ev=>{
      let timeStr=ev.all_day?'All day':ev.start_time||'';
      if(timeStr&&!ev.all_day){const[h,m]=timeStr.split(':');const hr=parseInt(h);timeStr=(hr>12?hr-12:hr||12)+':'+m+(hr>=12?' PM':' AM')}
      html+=`<div class="event-card" onclick="openEditModal(${ev.id},'${ev.event_date}','${ev.start_time||''}','${ev.end_time||''}','${ev.summary.replace(/'/g,"\\'")}')"><div class="event-inner"><div class="event-time">${timeStr}</div><div class="event-title">${ev.summary}</div></div></div>`;
    });

    dayTasks.forEach(tk=>{html+=taskCard(tk)});
    html+='</div>';
  });

  if(!html)html='<div class="empty">NO EVENTS OR TASKS THIS WEEK</div>';
  container.innerHTML=html;
}

async function dismissEmail(id,fromAddr){
  const card=document.getElementById('email-'+id);
  card.classList.add('dismissed');
  await patch('email_suggestions','id=eq.'+id,{status:'dismissed'});
  // Learn: check how many times this sender has been dismissed
  if(fromAddr){
    const domain=fromAddr.replace(/.*@/,'').replace(/>.*/,'').toLowerCase();
    const dismissed=await q('email_suggestions','from_domain=eq.'+encodeURIComponent(domain)+'&status=eq.dismissed&select=id');
    if(dismissed.length>=3){
      // Auto-add skip rule after 3 dismissals from same domain
      await insert('email_rules',{from_pattern:domain,action:'skip',reason:'Auto-learned: dismissed 3+ times'});
    }
  }
  setTimeout(()=>loadEmailSuggestions(),400);
}

  document.getElementById(note?'noteContent':'noteTitle').focus();
}

function hideNoteModal(){document.getElementById('noteModal').classList.remove('show');editingNoteId=null}

async function saveNote(){
  const title=document.getElementById('noteTitle').value.trim();
  const content=document.getElementById('noteContent').value.trim();
  if(!content&&!title)return;
  // Auto-detect links
  const urlMatch=content.match(/https?:\/\/[^\s]+/);
  const url=urlMatch?urlMatch[0]:'';
  const finalType=url&&noteType==='text'?'link':noteType;
  const data={title:title||content.substring(0,60),content:content,type:finalType,url:url,business:noteBiz};
  if(editingNoteId){
    data.updated_at=new Date().toISOString();
    await patch('notes','id=eq.'+editingNoteId,data);
  } else {
    await insert('notes',data);
  }
  hideNoteModal();
  loadNotes();
}

async function deleteNote(){
  if(!editingNoteId||!confirm('Delete this note?'))return;
  try{await fetch(`${SB_URL}/rest/v1/notes?id=eq.${editingNoteId}`,{method:'DELETE',headers:H})}catch(e){}
  hideNoteModal();
  loadNotes();
}

async function loadNotes(){
  allNotesCache=await q('notes','order=pinned.desc,created_at.desc');
  renderNotes(allNotesCache);
}

function filterNotes(){
  const term=document.getElementById('noteSearchInput').value.toLowerCase();
  const filtered=term?allNotesCache.filter(n=>n.title.toLowerCase().includes(term)||n.content.toLowerCase().includes(term)||(n.tags||[]).some(t=>t.toLowerCase().includes(term))):allNotesCache;
  renderNotes(filtered);
}

function renderNotes(notes){
  const container=document.getElementById('notesContent');
  if(!notes.length){container.innerHTML='<div class="empty">NO NOTES YET<br>Tap + NOTE to capture something</div>';return}
  let html='';
  notes.forEach(n=>{
    const date=new Date(n.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'America/Chicago'});
    const tags=(n.tags||[]).map(t=>`<span class="note-tag">${t}</span>`).join('');
    const preview=n.type==='link'&&n.url?`<a class="note-link" href="${n.url}" target="_blank" onclick="event.stopPropagation()">${n.url}</a>`:`<div class="note-preview">${n.content.replace(/</g,'&lt;')}</div>`;
    html+=`<div class="note-card type-${n.type}${n.pinned?' pinned':''}" onclick='showNoteModal(${JSON.stringify(n).replace(/'/g,"&#39;")})'>
      ${n.title?`<div class="note-title">${n.title}</div>`:''}
      ${preview}
      <div class="note-meta">
        <span>${n.note_id}</span>
        <span>${n.type.toUpperCase()}</span>
        <span>${n.business}</span>
        <span>${date}</span>
        ${tags}
      </div>
    </div>`;
  });
  container.innerHTML=html;
}

// === DRAG & DROP / FILE UPLOAD ===
(function(){
  const dz=document.getElementById('dropZone');
  if(!dz)return;
  ['dragenter','dragover'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.add('drag-over')}));
  ['dragleave','drop'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.remove('drag-over')}));
  dz.addEventListener('drop',ev=>{
    const files=ev.dataTransfer.files;
    const text=ev.dataTransfer.getData('text/plain');
    const html=ev.dataTransfer.getData('text/html');
    const url=ev.dataTransfer.getData('text/uri-list');
    if(files.length>0){handleFiles(files)}
    else if(url){handleDroppedUrl(url)}
    else if(text){handleDroppedText(text,html)}
  });
})();

async function handleDroppedUrl(url){
  const dz=document.getElementById('dropZone');
  dz.classList.add('uploading');
  dz.querySelector('.drop-zone-text').textContent='SAVING LINK...';
  const title=url.replace(/https?:\/\/(www\.)?/,'').split('/')[0];
  await insert('notes',{title:title,content:url,type:'link',url:url,business:'Personal'});
  dz.classList.remove('uploading');
  dz.querySelector('.drop-zone-text').textContent='DROP FILES HERE OR TAP TO UPLOAD';
  loadNotes();
}

async function handleDroppedText(text,html){
  const dz=document.getElementById('dropZone');
  dz.classList.add('uploading');
  dz.querySelector('.drop-zone-text').textContent='SAVING NOTE...';
  const urlMatch=text.match(/https?:\/\/[^\s]+/);
  const type=urlMatch?'link':'text';
  const title=text.substring(0,60).replace(/\n/g,' ');
  await insert('notes',{title:title,content:text,type:type,url:urlMatch?urlMatch[0]:'',business:'Personal'});
  dz.classList.remove('uploading');
  dz.querySelector('.drop-zone-text').textContent='DROP FILES HERE OR TAP TO UPLOAD';
  loadNotes();
}

async function handleFiles(files){
  const dz=document.getElementById('dropZone');
  let previewHtml='<div class="file-preview">';
  for(const f of files){
    previewHtml+=`<div class="file-chip" id="chip-${f.name.replace(/\W/g,'')}">${f.name}</div>`;
  }
  previewHtml+='</div>';
  dz.innerHTML=dz.innerHTML.split('<div class="file-preview">')[0]+previewHtml;

  for(const f of files){
    const chipId='chip-'+f.name.replace(/\W/g,'');
    const chip=document.getElementById(chipId);
    try{
      if(f.type.startsWith('image/')){
        // Read image as base64 and store
        const b64=await fileToBase64(f);
        const content='[Image: '+f.name+']\n\nBase64 data stored. Use /catch with this image in Claude Code for OCR.';
        await insert('notes',{title:f.name,content:content,type:'reference',business:'Personal',tags:['{image}']});
        if(chip)chip.classList.add('done');
      } else if(f.type==='application/pdf'||f.name.endsWith('.pdf')){
        if(chip)chip.textContent=f.name+' READING...';
        const text=await extractPdfText(f);
        // Auto-tag based on content
        const tags=['{pdf}'];
        if(/rpg|dungeon|character|armor|spell|hitpoint|hit point|saving throw|ability score|game master|player character/i.test(text))tags.push('{rpg}','{rules}');
        if(/invoice|receipt|total|subtotal|tax|payment|paid/i.test(text)&&!/rpg|spell/i.test(text))tags.push('{financial}');
        if(/contract|agreement|terms|whereas|party|herein/i.test(text))tags.push('{legal}');
        if(/recipe|ingredients|preheat|tablespoon|teaspoon/i.test(text))tags.push('{recipe}');
        if(/manual|instructions|setup|installation|warranty/i.test(text))tags.push('{manual}');
        // Clean title
        const cleanName=f.name.replace(/\.pdf$/i,'').replace(/[_-]/g,' ');
        // Save as note
        const noteRes=await insert('notes',{title:cleanName,content:text||'[Could not extract text]',type:'reference',business:'Personal',tags:tags});
        // Auto-detect financial statement
        const isFinancial=/statement date|amount due|payment due|outstanding balance|account number|maturity date/i.test(text);
        if(isFinancial&&noteRes&&noteRes[0]){
          if(chip)chip.textContent=f.name+' PARSING...';
          const fs=parseFinancialStatement(text);
          fs.source_note_id=noteRes[0].id;
          fs.raw_text=text.substring(0,500);
          await insert('financial_statements',fs);
          if(chip){chip.classList.add('done');chip.textContent=fs.lender+' ✓'}
        } else {
          if(chip){chip.classList.add('done');chip.textContent=f.name+' ✓'}
        }
      } else {
        // Text-based files
        const text=await f.text();
        const title=f.name;
        const urlMatch=text.match(/https?:\/\/[^\s]+/);
        await insert('notes',{title:title,content:text.substring(0,10000),type:urlMatch?'link':'text',url:urlMatch?urlMatch[0]:'',business:'Personal'});
        if(chip)chip.classList.add('done');
      }
    }catch(e){
      if(chip){chip.classList.add('error');chip.textContent=f.name+' FAILED'}
    }
  }

  setTimeout(()=>{
    dz.innerHTML='<input type="file" id="fileInput" multiple style="display:none" onchange="handleFiles(this.files)"><div class="drop-zone-text" onclick="document.getElementById(\'fileInput\').click()">DROP FILES HERE OR TAP TO UPLOAD</div>';
    loadNotes();
  },1500);
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=>res(reader.result);
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });
}

function parseFinancialStatement(text){
  const fs={lender:'Unknown',account_number:'',statement_date:null,payment_due_date:null,amount_due:null,outstanding_balance:null,regular_payment:null,vehicle_or_asset:'',business:'Personal'};
  // Detect lender
  const lenders=[
    [/toyota\s*financial/i,'Toyota Financial Services'],
    [/u\.?s\.?\s*bank/i,'US Bank'],
    [/synchrony|onepay/i,'Synchrony'],
    [/chase/i,'JPMorgan Chase'],
    [/capital\s*one/i,'Capital One'],
    [/wells\s*fargo/i,'Wells Fargo'],
    [/ally\s*financial/i,'Ally Financial'],
    [/ford\s*credit|ford\s*motor/i,'Ford Credit'],
    [/honda\s*financial/i,'Honda Financial'],
    [/hyundai\s*capital/i,'Hyundai Capital'],
    [/bmw\s*financial/i,'BMW Financial'],
    [/american\s*express|amex/i,'American Express'],
    [/discover/i,'Discover'],
    [/citi|citibank/i,'Citibank'],
    [/bank\s*of\s*america/i,'Bank of America']
  ];
  for(const[re,name]of lenders){if(re.test(text)){fs.lender=name;break}}
  // Account number
  const acct=text.match(/account\s*(?:number|#|no\.?)\s*[:.]?\s*([0-9\s\-]{5,20})/i);
  if(acct)fs.account_number=acct[1].trim();
  // Dates
  const stmtDate=text.match(/statement\s*date\s*[:.]?\s*(\d{1,2}\/\d{1,2}\/\d{2,4})/i);
  if(stmtDate)fs.statement_date=parseUSDate(stmtDate[1]);
  const dueDate=text.match(/(?:payment\s*)?due\s*date\s*[:.]?\s*(\d{1,2}\/\d{1,2}\/\d{2,4})/i);
  if(dueDate)fs.payment_due_date=parseUSDate(dueDate[1]);
  // Amounts
  const amtDue=text.match(/(?:total\s*)?amount\s*due\s*[:.]?\s*\$?([\d,]+\.?\d*)/i);
  if(amtDue)fs.amount_due=parseFloat(amtDue[1].replace(/,/g,''));
  const balance=text.match(/outstanding\s*balance\s*\*?\s*[:.]?\s*\$?([\d,]+\.?\d*)/i);
  if(balance)fs.outstanding_balance=parseFloat(balance[1].replace(/,/g,''));
  const regPmt=text.match(/regular\s*payment\s*(?:amount)?\s*[:.]?\s*\$?([\d,]+\.?\d*)/i);
  if(regPmt)fs.regular_payment=parseFloat(regPmt[1].replace(/,/g,''));
  // Vehicle
  const vehicle=text.match(/vehicle\s*(?:\/\s*last\s*\d+\s*of\s*vin)?\s*[:.]?\s*([A-Za-z]+(?:\s*\/\s*[A-Za-z0-9\-]+)?)/i);
  if(vehicle)fs.vehicle_or_asset=vehicle[1].trim();
  // Business detection
  if(/happy\s*pup|manor/i.test(text))fs.business='Happy Pup Manor';
  return fs;
}

function parseUSDate(s){
  const parts=s.split('/');
  if(parts.length!==3)return null;
  let[m,d,y]=parts;
  if(y.length===2)y='20'+y;
  return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
}

async function extractPdfText(file){
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      text+=content.items.map(item=>item.str).join(' ')+'\n\n';
    }
    return text.trim()||'[No text found in PDF]';
  }catch(e){
    return '[PDF extraction failed: '+e.message+']';
  }
}

function openEditModal(id,date,start,end,summary){
  editingEventId=id;
  document.getElementById('editSummary').value=summary;
  document.getElementById('editDate').value=date;
  document.getElementById('editStart').value=start;
  document.getElementById('editEnd').value=end;
  document.getElementById('editModal').classList.add('show');
  document.getElementById('editSummary').focus();
}

function hideEditModal(){
  document.getElementById('editModal').classList.remove('show');
  editingEventId=null;
}

async function saveEvent(){
  if(!editingEventId)return;
  const data={
    summary:document.getElementById('editSummary').value.trim(),
    event_date:document.getElementById('editDate').value,
    start_time:document.getElementById('editStart').value||null,
    end_time:document.getElementById('editEnd').value||null
  };

  await patch('calendar_cache','id=eq.'+editingEventId,data);

  loadDashboard();
}

async function deleteEvent(){
  if(!editingEventId)return;
  if(!confirm('Delete this event?'))return;
  try{
    await fetch(`${SB_URL}/rest/v1/calendar_cache?id=eq.${editingEventId}`,{method:'DELETE',headers:H});
  }catch(e){}
  hideEditModal();
  loadDashboard();
}
